<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <div class="card dashboard-card">
            <div class="dashboard-header">
                <div>
                    <h1>Task Dashboard</h1>
                    <p id="welcomeText"></p>
                </div>
                <button id="logoutBtn" class="secondary">Logout</button>
            </div>
            <div class="task-controls">
                <label for="statusFilter">Filter by status:</label>
                <select id="statusFilter">
                    <option value="">All tasks</option>
                    <option value="Pending">Pending</option>
                    <option value="Completed">Completed</option>
                </select>
                <button id="refreshBtn" class="secondary">Refresh</button>
            </div>
            <div class="task-list" id="taskList"></div>
            <div class="task-form">
                <h2 id="taskFormTitle">Create Task</h2>
                <input id="taskTitle" type="text" placeholder="Task title" />
                <textarea id="taskDescription" placeholder="Task description"></textarea>
                <label for="taskStatus">Task status:</label>
                <select id="taskStatus">
                    <option value="Pending">Pending</option>
                    <option value="Completed">Completed</option>
                </select>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">Priority:</label>
                        <select id="taskPriority">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date:</label>
                        <input id="taskDueDate" type="date" />
                    </div>
                </div>
                <button id="saveTaskBtn">Save Task</button>
                <button id="cancelEditBtn" class="secondary hidden">Cancel Edit</button>
                <p class="message" id="taskMessage"></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
