<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <div class="card auth-card">
            <h1>Smart Task Manager</h1>
            <div class="form-toggle">
                <button id="loginTab" class="active">Login</button>
                <button id="registerTab">Register</button>
            </div>
            <form id="loginForm" class="auth-form">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" placeholder="Email" required />
                <label for="loginPassword">Password</label>
                <div class="password-field">
                    <input id="loginPassword" type="password" placeholder="Password" required />
                    <button type="button" class="eye-btn" onclick="togglePassword('loginPassword')">
                        <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <div class="forgot-password-container">
                    <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                </div>
                <button type="submit">Login</button>
                <p class="message" id="loginMessage"></p>
            </form>
            <form id="forgotPasswordForm" class="auth-form hidden">
                <h2>Reset Password</h2>
                <label for="forgotEmail">Email</label>
                <input id="forgotEmail" type="email" placeholder="Email" required />
                <label for="newPassword">New Password</label>
                <div class="password-field">
                    <input id="newPassword" type="password" placeholder="New Password" required />
                    <button type="button" class="eye-btn" onclick="togglePassword('newPassword')">
                        <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-field">
                    <input id="confirmPassword" type="password" placeholder="Confirm Password" required />
                    <button type="button" class="eye-btn" onclick="togglePassword('confirmPassword')">
                        <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <button type="submit">Reset Password</button>
                <div class="form-footer">
                    <a href="#" id="backToLogin" class="back-link">Back to Login</a>
                </div>
                <p class="message" id="forgotMessage"></p>
            </form>
            <form id="registerForm" class="auth-form hidden">
                <label for="registerName">Name</label>
                <input id="registerName" type="text" placeholder="Full name" required />
                <label for="registerEmail">Email</label>
                <input id="registerEmail" type="email" placeholder="Email" required />
                <label for="registerPassword">Password</label>
                <div class="password-field">
                    <input id="registerPassword" type="password" placeholder="Password" required />
                    <button type="button" class="eye-btn" onclick="togglePassword('registerPassword')">
                        <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <button type="submit">Register</button>
                <p class="message" id="registerMessage"></p>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
